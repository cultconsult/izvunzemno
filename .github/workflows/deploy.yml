name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Copy runtime files into backend node_modules
        run: |
          mkdir -p packages/backend/node_modules/@nordcraft/runtime/dist
          cp -r packages/runtime/dist/* packages/backend/node_modules/@nordcraft/runtime/dist/

      - name: Build backend (sync assets + bundle)
        working-directory: packages/backend
        run: bun run predeploy

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/backend
          command: deploy --no-bundle
